<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Galeri Pengalaman | Portfolio Web Developer</title>
    <meta name="description"
        content="Galeri dokumentasi pengalaman, proyek, kegiatan, dan perjalanan profesional sebagai Web Developer.">
    <meta name="keywords" content="portfolio web developer, galeri pengalaman, proyek website, dokumentasi kegiatan">

    <!-- Open Graph -->
    <meta property="og:title" content="Galeri Pengalaman Portfolio">
    <meta property="og:description" content="Dokumentasi pengalaman profesional dan proyek web developer">
    <meta property="og:type" content="website">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.8);
            --text: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: var(--text);
            min-height: 100vh;
        }

        /* NAVBAR (INTEGRATED WITH PORTFOLIO) */

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(2, 6, 23, 0.8);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        }

        /* NAV CONTAINER - SYNC WITH MAIN PORTFOLIO UI */

        .nav {
            max-width: 1200px;
            margin: auto;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #navMenu {
            list-style: none;
            display: flex;
            align-items: center;
        }

        .nav-container {
            max-width: 1200px;
            margin: auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #22d3ee;
        }

        /* SECTION TITLE */

        .section-header {
            text-align: center;
            padding: 70px 20px 30px;
        }

        .section-header h1 {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 700;
            background: linear-gradient(90deg, #6366f1, #22d3ee);
            -webkit-background-clip: text;
            color: transparent;
        }

        .section-header p {
            margin-top: 12px;
            opacity: 0.7;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 30px 20px 60px;
        }

        /* GALLERY GRID */

        .gallery {
            column-count: 3;
            column-gap: 20px;
        }

        /* MASONRY RESPONSIVE */

        @media (max-width: 992px) {
            .gallery {
                column-count: 2;
            }
        }

        @media (max-width: 576px) {
            .gallery {
                column-count: 1;
            }
        }

        .card {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            background: var(--card);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            opacity: 0;
            transform: translateY(40px);
        }

        .card {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            background: var(--card);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            opacity: 0;
            transform: translateY(40px);
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
            opacity: 0;
            transition: 0.35s ease;
        }

        .card:hover .overlay {
            opacity: 1;
        }

        .overlay h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .overlay span {
            font-size: 13px;
            opacity: 0.7;
        }

        footer {
            text-align: center;
            padding: 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.15);
            font-size: 14px;
            opacity: 0.6;
        }

        /* LIGHTBOX */

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            z-index: 999;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 14px;
        }

        .close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 32px;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 768px) {

            .card img {
                height: 220px;
            }

            .nav-links {
                display: none;
            }

        }
    </style>
</head>

<body>

    <!-- NAVBAR -->

    <header>

        <div class="nav">

            <div class="logo" style="font-weight:700; letter-spacing:0.5px;">
                Portfolio Gallery
            </div>

            <ul id="navMenu">
                <li><a href="index.html" class="home-btn">🏠 Kembali</a></li>
            </ul>

        </div>

    </header>

    <!-- GALLERY SECTION (INTEGRATED) -->

    <section id="gallery">

        <div class="section-header">
            <h1>Galeri Pengalaman</h1>
            <p>Dokumentasi kegiatan, proyek, dan perjalanan profesional</p>
        </div>

        <div class="container">

            <div class="gallery">

                <!-- CARD -->

                <figure class="card">
                    <img loading="lazy" src="https://picsum.photos/600/400?random=1"
                        alt="Pengalaman Magang Web Developer">
                    <figcaption class="overlay">
                        <h3>Pengalaman Magang</h3>
                        <span>Web Developer Internship</span>
                    </figcaption>
                </figure>

                <figure class="card">
                    <img loading="lazy" src="https://picsum.photos/600/400?random=2"
                        alt="Proyek Website Sistem Informasi">
                    <figcaption class="overlay">
                        <h3>Proyek Website</h3>
                        <span>Pengembangan Sistem Informasi</span>
                    </figcaption>
                </figure>

                <figure class="card">
                    <img loading="lazy" src="https://picsum.photos/600/400?random=3"
                        alt="Pelatihan Workshop Programming">
                    <figcaption class="overlay">
                        <h3>Pelatihan IT</h3>
                        <span>Workshop Programming</span>
                    </figcaption>
                </figure>

                <figure class="card">
                    <img loading="lazy" src="https://picsum.photos/600/400?random=4" alt="Kegiatan Kolaborasi Project">
                    <figcaption class="overlay">
                        <h3>Kegiatan Tim</h3>
                        <span>Kolaborasi Project</span>
                    </figcaption>
                </figure>

                <figure class="card">
                    <img loading="lazy" src="https://picsum.photos/600/400?random=5" alt="Presentasi Demo Aplikasi">
                    <figcaption class="overlay">
                        <h3>Presentasi</h3>
                        <span>Demo Aplikasi</span>
                    </figcaption>
                </figure>

                <figure class="card">
                    <img loading="lazy" src="https://picsum.photos/600/400?random=6"
                        alt="Achievement Pencapaian Project">
                    <figcaption class="overlay">
                        <h3>Achievement</h3>
                        <span>Pencapaian Project</span>
                    </figcaption>
                </figure>

            </div>

        </div>

    </section>

    <footer>
        © 2026 Portfolio Gallery | Dokumentasi Pengalaman
    </footer>

    <!-- LIGHTBOX -->

    <div class="lightbox" id="lightbox">
        <span class="close" id="close">×</span>
        <img id="lightbox-img" src="" alt="Preview gambar pengalaman">
    </div>

    <script>

        /* LIGHTBOX */

        const cards = document.querySelectorAll('.card img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close');

        cards.forEach(img => {
            img.addEventListener('click', () => {
                lightbox.classList.add('active');
                lightboxImg.src = img.src;
            });
        });

        closeBtn.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });

        /* LAZY LOAD ANIMATION (INTERSECTION OBSERVER) */

        const observer = new IntersectionObserver(entries => {

            entries.forEach(entry => {

                if (entry.isIntersecting) {

                    entry.target.classList.add('show');

                }

            });

        }, {
            threshold: 0.15
        });

        document.querySelectorAll('.card').forEach(card => {
            observer.observe(card);
        });

    </script>

</body>

</html>
